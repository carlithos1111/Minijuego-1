<!DOCTYPE html><html lang="es"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">    <title>Coche Celular</title>    <style>        body { margin: 0; background: #333; color: white; text-align: center; font-family: sans-serif; overflow: hidden; }        canvas { background: #2e8b57; display: block; margin: 10px auto; width: 90vw; height: 50vh; border: 2px solid #fff; }        .controles { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 10px; max-width: 400px; margin: 0 auto; }        .grupo { display: flex; gap: 10px; justify-content: center; }        button { width: 70px; height: 70px; font-size: 24px; font-weight: bold; background: #4CAF50; color: white; border: none; border-radius: 50%; touch-action: manipulation; }        button:active { background: #333; border: 2px solid #4CAF50; }        #btnFreno { background: #f44336; }    </style></head><body>    <canvas id="g" width="400" height="400"></canvas>    <div class="controles">        <div class="grupo">            <button id="bI">◀</button>            <button id="bD">▶</button>        </div>        <div class="grupo">            <button id="bF">▼</button>            <button id="bA">▲</button>        </div>    </div>    <script>        const canvas = document.getElementById('g'), ctx = canvas.getContext('2d');        let coche = { x: 200, y: 320, vel: 0, ang: 0 }, cArr = [], cont = 0, keys = {};        function ac(id, k) {            let b = document.getElementById(id);            b.addEventListener('touchstart', (e) => { e.preventDefault(); keys[k] = true; });            b.addEventListener('touchend', () => keys[k] = false);        }        ac('bA','w'); ac('bF','s'); ac('bI','a'); ac('bD','d');        class Seg { constructor(y) { this.y = y; } dib() { ctx.fillStyle = '#696969'; ctx.fillRect(100, this.y, 200, 40); ctx.fillStyle = '#fff'; ctx.fillRect(195, this.y, 10, 15); } }        for(let y=400; y>=-40; y-=40) cArr.push(new Seg(y));        function loop() {            if (keys['w']) coche.vel = Math.min(coche.vel + 0.2, 5);            else if (keys['s']) coche.vel = Math.max(coche.vel - 0.3, -2);            else { coche.vel *= 0.95; if(Math.abs(coche.vel)<0.05) coche.vel=0; }            if (keys['a'] && coche.vel!==0) coche.ang -= 0.04 * (coche.vel/5);            if (keys['d'] && coche.vel!==0) coche.ang += 0.04 * (coche.vel/5);            coche.x += Math.sin(coche.ang) * coche.vel;            if(coche.x<110) coche.x=110; if(coche.x>290) coche.x=290;            cont += coche.vel;            if (cont >= 40) { cont = 0; cArr.unshift(new Seg(-40)); }            if (cArr.length > 12) cArr.pop();            for(let i=0; i<cArr.length; i++) cArr[i].y += coche.vel;            ctx.fillStyle = '#2e8b57'; ctx.fillRect(0,0,400,400);            cArr.forEach(s => s.dib());            ctx.save(); ctx.translate(coche.x, coche.y); ctx.rotate(coche.ang);            ctx.fillStyle = '#ff0000'; ctx.fillRect(-10, -20, 20, 40);            ctx.fillStyle = '#000'; ctx.fillRect(-13,-15,3,8); ctx.fillRect(10,-15,3,8); ctx.fillRect(-13,7,3,8); ctx.fillRect(10,7,3,8);            ctx.restore(); requestAnimationFrame(loop);        }        loop();    </script></body></html>
