<!DOCTYPE html><html lang="es"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Juego de Fuegos Artificiales</title>    <style>        body {            margin: 0;            padding: 0;            background: #000;            overflow: hidden;            display: flex;            justify-content: center;            align-items: center;            height: 100vh;            color: white;            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;            user-select: none;        }        canvas {            display: block;        }        #instructions {            position: absolute;            top: 20px;            pointer-events: none;            text-align: center;            text-shadow: 0 0 10px rgba(0,0,0,0.8);        }        h1 { margin: 0 0 10px 0; font-size: 2.5rem; }        p { margin: 0; font-size: 1.2rem; opacity: 0.8; }    </style></head><body>    <div id="instructions">        <h1>¡Fuegos Artificiales!</h1>        <p>Toca la pantalla para lanzar pirotecnia</p>    </div>    <canvas id="fireworkCanvas"></canvas>    <script>        const canvas = document.getElementById('fireworkCanvas');        const ctx = canvas.getContext('2d');        // Ajustar tamaño del canvas        function resizeCanvas() {            canvas.width = window.innerWidth;            canvas.height = window.innerHeight;        }        window.addEventListener('resize', resizeCanvas);        resizeCanvas();        class Firework {            constructor(x, y) {                this.x = x;                this.y = y;                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;                this.particles = [];                // Crear 100 partículas por explosión                for (let i = 0; i < 100; i++) {                    this.particles.push(new Particle(this.x, this.y, this.color));                }            }            update() {                for (let i = 0; i < this.particles.length; i++) {                    this.particles[i].update();                    if (this.particles[i].alpha <= 0) {                        this.particles.splice(i, 1);                        i--;                    }                }            }            draw() {                for (let i = 0; i < this.particles.length; i++) {                    this.particles[i].draw();                }            }        }        class Particle {            constructor(x, y, color) {                this.x = x;                this.y = y;                this.color = color;                // Ángulo y velocidad aleatoria para simular expansión                const angle = Math.random() * Math.PI * 2;                const speed = Math.random() * 6 + 2;                this.vx = Math.cos(angle) * speed;                this.vy = Math.sin(angle) * speed;                this.alpha = 1;                this.decay = Math.random() * 0.02 + 0.015;            }            update() {                this.x += this.vx;                this.y += this.vy;                this.vy += 0.1; // Efecto de gravedad                this.alpha -= this.decay;            }            draw() {                ctx.save();                ctx.globalAlpha = this.alpha;                ctx.fillStyle = this.color;                ctx.beginPath();                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);                ctx.fill();                ctx.restore();            }        }        let fireworks = [];        // Detectar clics o toques en la pantalla        function createFirework(event) {            const rect = canvas.getBoundingClientRect();            const x = (event.clientX || event.touches[0].clientX) - rect.left;            const y = (event.clientY || event.touches[0].clientY) - rect.top;            fireworks.push(new Firework(x, y));        }        window.addEventListener('click', createFirework);        window.addEventListener('touchstart', createFirework);        // Bucle principal de animación        function animate() {            // Fondo semitransparente para crear el efecto de "estela"            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';            ctx.fillRect(0, 0, canvas.width, canvas.height);            for (let i = 0; i < fireworks.length; i++) {                fireworks[i].update();                fireworks[i].draw();                if (fireworks[i].particles.length === 0) {                    fireworks.splice(i, 1);                    i--;                }            }            requestAnimationFrame(animate);        }        animate();    </script></body></html>
