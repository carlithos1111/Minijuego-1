<!DOCTYPE html><html lang="es"><head>    <meta charset="UTF-8">    <style>        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }        #game { width: 600px; height: 600px; background: #2d5a27; position: relative; overflow: hidden; border: 8px solid #fff; }                /* Gato más grande (160px) */        #meowl {             width: 160px; height: 160px;             background-image: url('https://i.postimg.cc/XJLYfkrF/play-ball.gif');             background-size: contain; background-repeat: no-repeat;             position: absolute; bottom: 50px; left: 50px; transition: transform 0.1s;         }                #estambre { width: 60px; height: 60px; background-image: url('https://i.postimg.cc/t4JTW4nL/Screenshot-20260627-162813-Google.png'); background-size: contain; background-repeat: no-repeat; position: absolute; bottom: 50px; left: 600px; }        #faro { width: 50px; height: 350px; background: #ffcc00; position: absolute; top: 0; left: 800px; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; }                #go-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; color: white; }        .controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }        .btn { padding: 15px 20px; font-size: 16px; cursor: pointer; z-index: 101; }    </style></head><body>    <div id="game">        <div id="meowl"></div>        <div id="estambre"></div>        <div id="faro"></div>        <div class="controls">            <button class="btn" id="s">SALTO</button>            <button class="btn" id="e">ENCOGERSE</button>        </div>        <div id="go-screen">            <h1>GAME OVER</h1>            <button class="btn" onclick="location.reload()">REINICIAR</button>        </div>    </div>    <audio id="bg-music" loop>        <source src="https://dl.dropboxusercontent.com/scl/fi/esgi2sj7ppn6gyiaaf2ul/Yael-Naim-New-Soul-Lyrics.mp3?rlkey=fi3cgf2yo2fnmnmzakdbbhc5v" type="audio/mpeg">    </audio><script>    const m = document.getElementById('meowl'), est = document.getElementById('estambre'), faro = document.getElementById('faro'), go = document.getElementById('go-screen'), music = document.getElementById('bg-music');    let posY = 50, velY = 0, gravedad = 0.8, encogido = false, vivo = true;    let estX = 600, faroX = 800;    window.addEventListener('pointerdown', () => { music.play(); }, { once: true });    document.getElementById('s').addEventListener('pointerdown', (e) => { e.preventDefault(); if(posY <= 50) velY = 20; });    document.getElementById('e').addEventListener('pointerdown', (e) => {         e.preventDefault(); encogido = true; m.style.transform = 'scaleY(0.4)';        setTimeout(() => { encogido = false; m.style.transform = 'scaleY(1)'; }, 700);    });    function isColliding(div1, div2) {        const r1 = div1.getBoundingClientRect(), r2 = div2.getBoundingClientRect();                return !(r1.right < r2.left + 35 || r1.left > r2.right - 35 || r1.bottom < r2.top + 35 || r1.top > r2.bottom - 35);    }    function update() {        if(!vivo) return;        velY -= gravedad; posY += velY;        if(posY <= 50) { posY = 50; velY = 0; }        m.style.bottom = posY + 'px';        estX -= 5; faroX -= 5;        if(estX < -60) estX = 600;        if(faroX < -60) faroX = 800;        est.style.left = estX + 'px'; faro.style.left = faroX + 'px';        if(isColliding(m, est) || (isColliding(m, faro) && !encogido)) gameOver();        requestAnimationFrame(update);    }    function gameOver() { vivo = false; go.style.display = 'flex'; }    update();</script></body></html>
